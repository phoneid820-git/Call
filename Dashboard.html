<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard - Sync Call</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --bg: #0a0f1d; --card: rgba(30, 41, 59, 0.4); --green: #25D366; --red: #ff3b30; --glass: rgba(255, 255, 255, 0.05); --yellow: #ffcc00; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
body { background: transparent !important; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

.dashboard-container {
    width: 400px; height: 85vh; max-height: 800px; background: var(--bg);
    border-radius: 40px; position: relative; display: flex; flex-direction: column;
    border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 50px 100px rgba(0,0,0,0.9); overflow: hidden;
    -webkit-app-region: drag;
}

@media (max-width: 480px) { .dashboard-container { width: 100vw; height: 100vh; max-height: none; border-radius: 0; border: none; } }

.header-actions, .user-list, .right-arrow-btn, .modal-content, .my-dp, .user-card { -webkit-app-region: no-drag; }

.header-section {
    padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid var(--glass); flex-shrink: 0;
}

.user-meta { display: flex; align-items: center; gap: 12px; }
.my-dp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--green); object-fit: cover; background: #1e293b; }
.info-labels b { color: white; font-size: 16px; display: block; }
.info-labels .id-tag { color: var(--yellow); font-weight: bold; font-size: 12px; letter-spacing: 1px; }

.header-actions { display: flex; gap: 10px; align-items: center; }
.logout-btn, .close-app-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; }
.logout-btn { background: rgba(255,255,255,0.1); color: white; }
.close-app-btn { background: var(--red); color: white; }

.user-list { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; scrollbar-width: none; scroll-behavior: smooth; }
.user-list::-webkit-scrollbar { display: none; }

.user-card {
    background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 10px 15px;
    display: flex; align-items: center; margin-bottom: 10px;
    border: 1px solid var(--glass); backdrop-filter: blur(15px);
    transition: transform 0.2s ease, background 0.3s;
    position: relative; cursor: pointer;
}
.user-card:hover { background: rgba(255, 255, 255, 0.08); }

.user-dp-list { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--green); object-fit: cover; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; background: #4a5568; position: absolute; left: 45px; bottom: 10px; border: 2px solid var(--bg); }
.status-dot.online { background: var(--green); box-shadow: 0 0 5px var(--green); }

.name-box { flex: 1; margin-left: 12px; pointer-events: none; }
.name-box b { color: white; font-size: 14px; display: block; }
.user-card-id { color: var(--yellow); font-weight: bold; font-size: 11px; }

.call-icon-btn { width: 36px; height: 36px; background: rgba(37, 211, 102, 0.15); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--green); }

.right-arrow-btn { position: absolute; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--green); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.5s; z-index: 10; }
.right-arrow-btn.out { transform: scale(0) rotate(180deg); }

.modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(15px); }
.modal-content { background: #000; width: 280px; padding: 30px 15px; border-radius: 35px; text-align: center; border: 1px solid rgba(37, 211, 102, 0.3); position: relative; animation: popIn 0.3s ease-out; }
.modal-x-btn { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; background: var(--red); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; cursor: pointer; }
.input-container { position: relative; width: 100%; max-width: 220px; margin: 20px auto; }
.input-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--green); }
.input-container input { width: 100%; padding: 12px 10px 12px 38px; background: #111; border: 1px solid #222; border-radius: 12px; color: white; outline: none; font-size: 13px; }
.save-btn { background: var(--green); color: white; border: none; padding: 10px 45px; border-radius: 12px; cursor: pointer; font-weight: bold; }
@keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>

<body>
<div class="dashboard-container">
    <div class="header-section">
        <div class="user-meta">
            <img src="https://via.placeholder.com/150" id="topDP" class="my-dp">
            <div class="info-labels">
                <b id="topName">Loading...</b>
                <span id="topID" class="id-tag">ID: 000000</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="logout-btn" onclick="logout()"><i class="fas fa-power-off"></i></button>
            <button class="close-app-btn" onclick="closeDashboard()"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="user-list" id="userBox"></div>

    <div class="right-arrow-btn" id="addBtn" onclick="openAdd()">
        <i class="fas fa-plus" style="color:white; font-size:22px;"></i>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <button class="modal-x-btn" onclick="closeAdd()"><i class="fas fa-times"></i></button>
            <i class="fas fa-search" style="color:var(--green); font-size:35px; margin-bottom:10px; display:block;"></i>
            <h3 style="color:white;">Find User</h3>
            <p style="color: #718096; font-size: 11px;">Enter Gmail or 6-Digit ID</p>
            <div class="input-container">
                <i class="fas fa-fingerprint"></i>
                <input type="text" id="userInput" placeholder="Gmail or 6-digit ID">
            </div>
            <button class="save-btn" onclick="saveUser()">Find & Add</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDuvS7Ca8yMORsFbPetbTLrE6jGR74k0nI",
  authDomain: "call-ce2bd.firebaseapp.com",
  databaseURL: "https://call-ce2bd-default-rtdb.firebaseio.com",
  projectId: "call-ce2bd",
  storageBucket: "call-ce2bd.firebasestorage.app",
  messagingSenderId: "546567026971",
  appId: "1:546567026971:web:e309b3779b46087a8c3bbe"
};

// Initialize Firebase with error handling
try {
    firebase.initializeApp(firebaseConfig);
    console.log("Firebase initialized successfully");
} catch (error) {
    console.error("Firebase initialization error:", error);
    alert("Failed to connect to Firebase. Please check your internet connection.");
}

const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

// Check Firebase connectivity
db.collection("_connection_check").limit(1).get()
    .then(() => console.log("Firestore connected"))
    .catch(error => console.error("Firestore connection error:", error));

rtdb.ref(".info/connected").on("value", (snap) => {
    if (snap.val() === true) {
        console.log("Realtime Database connected");
    } else {
        console.log("Realtime Database disconnected");
    }
});

let MY_ID = "";
let myPartners = JSON.parse(localStorage.getItem('myPartners')) || [];

auth.onAuthStateChanged(async (user) => {
    if (user) {
        MY_ID = user.uid;
        
        // Get shortID from Firestore user document
        const userDoc = await db.collection("users").doc(MY_ID).get();
        let shortID = MY_ID.substring(0, 6).toUpperCase(); // fallback
        
        if (userDoc.exists && userDoc.data().shortID) {
            shortID = userDoc.data().shortID;
        }
        
        document.getElementById('topID').innerText = "ID: " + shortID;
        
        // --- REAL-TIME DATA FETCHING ---
        db.collection("users").doc(MY_ID).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if(data.username) document.getElementById('topName').innerText = data.username;
                else document.getElementById('topName').innerText = "User";
                
                if(data.dp) {
                    const imgElement = document.getElementById('topDP');
                    imgElement.src = data.dp;
                    imgElement.onerror = function() {
                        this.src = "https://via.placeholder.com/150/25D366/FFFFFF?text=" + (data.username ? data.username.charAt(0).toUpperCase() : "U");
                    };
                } else {
                    document.getElementById('topDP').src = "https://via.placeholder.com/150/25D366/FFFFFF?text=" + (data.username ? data.username.charAt(0).toUpperCase() : "U");
                }
            } else {
                document.getElementById('topName').innerText = "Setup Required";
                document.getElementById('topDP').src = "https://via.placeholder.com/150/25D366/FFFFFF?text=U";
            }
        });

        rtdb.ref('users/' + MY_ID).update({ status: "online", lastSeen: Date.now() });
        rtdb.ref('users/' + MY_ID).onDisconnect().update({ status: "offline", lastSeen: Date.now() });

        renderList();
    } else {
        window.location.href = "index.html";
    }
});

async function renderList() {
    const box = document.getElementById('userBox');
    box.innerHTML = "";
    if (myPartners.length === 0) {
        box.innerHTML = `<p style="color:#4a5568; text-align:center; margin-top:50px;">No users found. Click + to add users.</p>`;
        return;
    }
    
    for (const u of myPartners) {
        // Get proper shortID from Firestore
        let shortID = u.id.substring(0, 6).toUpperCase(); // fallback
        try {
            const userDoc = await db.collection("users").doc(u.id).get();
            if (userDoc.exists && userDoc.data().shortID) {
                shortID = userDoc.data().shortID;
            }
        } catch (error) {
            console.error("Error fetching shortID:", error);
        }
        
        const card = document.createElement("div");
        card.className = "user-card";
        
        // Create safe image URL with fallback
        const imageUrl = u.pic || `https://via.placeholder.com/150/25D366/FFFFFF?text=${u.name ? u.name.charAt(0).toUpperCase() : 'U'}`;
        
        card.innerHTML = `
            <img src="${imageUrl}" class="user-dp-list" onerror="this.src='https://via.placeholder.com/150/25D366/FFFFFF?text=${u.name ? u.name.charAt(0).toUpperCase() : 'U'}'">
            <div class="status-dot" id="dot-${u.id}"></div>
            <div class="name-box">
                <b>${u.name || 'Unknown User'}</b>
                <span class="user-card-id">ID: ${shortID}</span>
            </div>
            <div class="call-icon-btn" onclick="event.stopPropagation(); startCall('${u.id}', '${u.name || 'Unknown User'}', '${u.pic || ''}')">
                <i class="fas fa-phone-alt"></i>
            </div>
        `;
        
        // Listen for online status with error handling
        const statusRef = rtdb.ref('users/' + u.id + '/status');
        statusRef.on('value', (snap) => {
            const dot = document.getElementById(`dot-${u.id}`);
            if (dot) {
                if (snap.val() === "online") {
                    dot.classList.add('online');
                } else {
                    dot.classList.remove('online');
                }
            }
        }, (error) => {
            console.error(`Status listener error for ${u.id}:`, error);
        });
        
        box.appendChild(card);
    }
}

async function saveUser() {
    const inputVal = document.getElementById('userInput').value.trim();
    if(!inputVal) return alert("Please enter ID or Email");

    try {
        let foundUser = null;
        
        if(inputVal.includes('@')) {
            // Search by email
            const snap = await db.collection("users").where("email", "==", inputVal.toLowerCase()).get();
            if(!snap.empty) {
                foundUser = { id: snap.docs[0].id, data: snap.docs[0].data() };
            }
        } else {
            // Search by shortID (new system)
            const snap = await db.collection("users").where("shortID", "==", inputVal.toUpperCase()).get();
            if(!snap.empty) {
                foundUser = { id: snap.docs[0].id, data: snap.docs[0].data() };
            } else {
                // Fallback to old UID-based search for backward compatibility
                const allUsers = await db.collection("users").get();
                allUsers.forEach(doc => {
                    if(doc.id.substring(0, 6).toUpperCase() === inputVal.toUpperCase()) {
                        foundUser = { id: doc.id, data: doc.data() };
                    }
                });
            }
        }
        
        if (foundUser) {
            if (foundUser.id === MY_ID) return alert("You can't add yourself!");
            
            // Check if user already exists in partners
            const existingPartner = myPartners.find(p => p.id === foundUser.id);
            if (!existingPartner) {
                myPartners.push({ 
                    id: foundUser.id, 
                    name: foundUser.data.username || 'Unknown User', 
                    pic: foundUser.data.dp || '' 
                });
                localStorage.setItem('myPartners', JSON.stringify(myPartners));
                await renderList();
                closeAdd();
            } else { 
                alert("User already added."); 
            }
        } else { 
            alert("User not found! Make sure the 6-digit ID or email is correct."); 
        }
    } catch (e) { 
        console.error("Search error:", e);
        alert("Error finding user. Please try again."); 
    }
}

function openAdd() { 
    document.getElementById('addBtn').classList.add('out'); 
    document.getElementById('addModal').style.display = 'flex'; 
}

function closeAdd() { 
    document.getElementById('addModal').style.display = 'none'; 
    document.getElementById('addBtn').classList.remove('out'); 
    document.getElementById('userInput').value = "";
}

function startCall(id, name, pic) {
    localStorage.setItem('callingID', id);
    localStorage.setItem('callingName', name);
    localStorage.setItem('callingPic', pic);
    window.location.href = "call.html";
}

function logout() {
    rtdb.ref('users/' + MY_ID).update({ status: "offline" }).then(() => {
        auth.signOut().then(() => { localStorage.clear(); window.location.href = "index.html"; });
    });
}

function closeDashboard() {
    const { ipcRenderer } = (typeof require !== 'undefined') ? require('electron') : { ipcRenderer: null };
    if (ipcRenderer) ipcRenderer.send("close-app");
    else window.close();
}
</script>
</body>
</html>
