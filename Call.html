<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --red: #ff3b30; --green: #25D366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #000; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .call-container {
            width: 100%; height: 100%; max-width: 400px; max-height: 800px;
            background: linear-gradient(to bottom, #1c2a38, #000);
            display: flex; flex-direction: column; justify-content: space-around; align-items: center;
            padding: 40px 20px; position: relative;
        }

        @media (min-width: 481px) {
            .call-container { border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; height: 90vh; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        }

        .top-section { text-align: center; width: 100%; }
        .profile-circle { width: 115px; height: 115px; border-radius: 50%; background: #333; margin: 0 auto 15px; border: 2px solid var(--green); overflow: hidden; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(37, 211, 102, 0.2); }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 32px; font-weight: 300; color: white; margin-bottom: 5px; }
        .timer { font-size: 18px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }

        .controls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 100%; max-width: 320px; }
        .btn-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .action-btn { width: 72px; height: 72px; border-radius: 50%; background: var(--glass); border: none; color: white; font-size: 24px; cursor: pointer; backdrop-filter: blur(20px); transition: 0.3s; }
        .action-btn:active { transform: scale(0.9); }
        .action-btn.active { background: white; color: black; }
        .btn-lbl { font-size: 12px; color: white; opacity: 0.8; text-transform: capitalize; }
        
        .bottom-section { width: 100%; display: flex; justify-content: center; }
        .end-call { width: 78px; height: 78px; background: var(--red); border-radius: 50%; border: none; color: white; font-size: 32px; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 59, 48, 0.3); transition: 0.3s; }
        .end-call i { transform: rotate(135deg); }
        .end-call:active { transform: scale(0.85); }
    </style>
</head>
<body>

<div class="call-container">
    <div class="top-section">
        <div class="profile-circle"><img src="" id="calling-dp"></div>
        <div class="name" id="calling-name">Connecting...</div>
        <div class="timer" id="time">00:00</div>
    </div>

    <div class="controls-grid">
        <div class="btn-wrapper">
            <button class="action-btn" id="muteBtn" onclick="toggleMute()"><i class="fas fa-microphone-slash"></i></button>
            <span class="btn-lbl">mute</span>
        </div>
        <div class="btn-wrapper">
            <button class="action-btn"><i class="fas fa-th"></i></button>
            <span class="btn-lbl">keypad</span>
        </div>
        <div class="btn-wrapper">
            <button class="action-btn" id="speakerBtn" onclick="toggleSpeaker()"><i class="fas fa-volume-up"></i></button>
            <span class="btn-lbl">speaker</span>
        </div>
    </div>

    <div class="bottom-section">
        <button class="end-call" onclick="endCallSession()"><i class="fas fa-phone"></i></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script> 
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Configuration Updated
const firebaseConfig = {
  apiKey: "AIzaSyDuvS7Ca8yMORsFbPetbTLrE6jGR74k0nI",
  authDomain: "call-ce2bd.firebaseapp.com",
  databaseURL: "https://call-ce2bd-default-rtdb.firebaseio.com",
  projectId: "call-ce2bd",
  storageBucket: "call-ce2bd.firebasestorage.app",
  messagingSenderId: "546567026971",
  appId: "1:546567026971:web:e309b3779b46087a8c3bbe",
  measurementId: "G-ZPDHLBWE0Z"
};

// Initialize Firebase with error handling
try {
    firebase.initializeApp(firebaseConfig);
    console.log("Firebase initialized successfully");
} catch (error) {
    console.error("Firebase initialization error:", error);
    alert("Failed to connect to Firebase. Please check your internet connection.");
}

const db = firebase.firestore();
const rtdb = firebase.database();

// Check Firebase connectivity
db.collection("_connection_check").limit(1).get()
    .then(() => console.log("Firestore connected"))
    .catch(error => console.error("Firestore connection error:", error));

rtdb.ref(".info/connected").on("value", (snap) => {
    if (snap.val() === true) {
        console.log("Realtime Database connected");
    } else {
        console.log("Realtime Database disconnected");
    }
});

let localStream;
let remoteStream;
let peerConnection;
let isMuted = false;
let timerInterval;

const myUserID = localStorage.getItem("myUserID");
const callingID = localStorage.getItem("callingID");
const callingName = localStorage.getItem("callingName");
const callingPic = localStorage.getItem("callingPic");

// WebRTC Configuration
const rtcConfiguration = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
    ]
};

window.onload = async () => {
    document.getElementById("calling-name").innerText = callingName || "User";
    const dpElement = document.getElementById("calling-dp");
    dpElement.src = callingPic || "https://via.placeholder.com/150";
    dpElement.onerror = function() {
        this.src = `https://via.placeholder.com/150/25D366/FFFFFF?text=${callingName ? callingName.charAt(0).toUpperCase() : 'U'}`;
    };
    
    try {
        // Get local audio stream
        localStream = await navigator.mediaDevices.getUserMedia({ 
            audio: true,
            video: false 
        });
        
        // Initialize WebRTC connection
        await initializeWebRTC();
        
        // Listen for call end from Firestore
        db.collection("calls").doc(callingID).onSnapshot((doc) => {
            if (!doc.exists || (doc.data() && doc.data().status === "ended")) {
                endCallSession(false);
            }
        });

        // Set call status as active
        await db.collection("calls").doc(myUserID).set({
            status: "active",
            connectedTo: callingID,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Notify the other user about the call
        await db.collection("calls").doc(callingID).set({
            status: "incoming",
            callerID: myUserID,
            callerName: localStorage.getItem("myName") || "User",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        startTimer();
    } catch (err) {
        console.error("Call initialization error:", err);
        if (err.name === 'NotAllowedError') {
            alert("Microphone access denied! Please allow microphone access to make calls.");
        } else if (err.name === 'NotFoundError') {
            alert("No microphone found! Please connect a microphone and try again.");
        } else {
            alert("Failed to initialize call: " + err.message);
        }
        window.location.href = "dashboard.html";
    }
};

async function initializeWebRTC() {
    try {
        // Create peer connection
        peerConnection = new RTCPeerConnection(rtcConfiguration);
        
        // Add local stream to peer connection
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });
        
        // Handle remote stream
        peerConnection.ontrack = (event) => {
            remoteStream = event.streams[0];
            console.log("Remote stream received");
        };
        
        // Handle ICE candidates
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                // Send ICE candidate through Firebase
                db.collection("calls").doc(callingID).collection("iceCandidates").add({
                    candidate: event.candidate,
                    from: myUserID,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        };
        
        // Create and send offer
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        // Send offer through Firebase
        await db.collection("calls").doc(callingID).set({
            offer: offer,
            from: myUserID,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        
        // Listen for answer
        db.collection("calls").doc(callingID).onSnapshot(async (doc) => {
            const data = doc.data();
            if (data.answer && data.answer.from !== myUserID) {
                await peerConnection.setRemoteDescription(data.answer);
            }
        });
        
        // Listen for ICE candidates
        db.collection("calls").doc(callingID).collection("iceCandidates")
            .where("from", "!=", myUserID)
            .onSnapshot(async (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const candidate = change.doc.data().candidate;
                        await peerConnection.addIceCandidate(candidate);
                    }
                });
            });
            
    } catch (error) {
        console.error("WebRTC initialization error:", error);
        throw error;
    }
}

function toggleMute() {
    isMuted = !isMuted;
    if (localStream) {
        localStream.getAudioTracks()[0].enabled = !isMuted;
        document.getElementById("muteBtn").classList.toggle("active");
    }
}

function toggleSpeaker() {
    document.getElementById("speakerBtn").classList.toggle("active");
}

function startTimer() {
    let s = 0;
    timerInterval = setInterval(() => {
        s++;
        let m = Math.floor(s / 60);
        let sec = s % 60;
        document.getElementById("time").innerText = `${m<10?'0'+m:m}:${sec<10?'0'+sec:sec}`;
    }, 1000);
}

async function endCallSession(notifyOther = true) {
    try {
        // Notify other user about call end
        if (notifyOther && myUserID && callingID) {
            await db.collection("calls").doc(myUserID).update({ status: "ended" });
            await db.collection("calls").doc(callingID).update({ status: "ended" });
        }
        
        // Clean up WebRTC connection
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        
        // Stop local media stream
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        // Stop remote media stream
        if (remoteStream) {
            remoteStream.getTracks().forEach(track => track.stop());
            remoteStream = null;
        }
        
        // Clear timer
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        // Clean up Firebase listeners
        // (Firebase automatically cleans up when page unloads)
        
        window.location.href = "dashboard.html";
    } catch (error) {
        console.error("Error ending call:", error);
        // Force redirect even if cleanup fails
        window.location.href = "dashboard.html";
    }
}
</script>
</body>
</html>
