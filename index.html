<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Sync Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --bg: #0a0f1d; --card: #1e293b; --green: #25D366; --red: #ff3b30; --yellow: #ffcc00; }

        body {
            margin: 0; padding: 0; background: transparent !important;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .login-container {
            width: 90%; max-width: 350px; background: var(--bg);
            border-radius: 30px; padding: 30px 20px; position: relative;
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1); -webkit-app-region: drag;
        }

        .close-btn, input, button, .create-link { -webkit-app-region: no-drag; }

        .close-btn { position: absolute; top: 15px; right: 20px; color: #718096; cursor: pointer; font-size: 26px; z-index: 1000; }
        
        .profile-area { position: relative; width: 90px; height: 90px; margin: 0 auto 15px; }
        .dp-circle { width: 100%; height: 100%; border-radius: 50%; background: var(--card); border: 3px solid var(--green); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .dp-circle i { font-size: 35px; color: var(--green); }
        .dp-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .input-wrapper { position: relative; width: 90%; margin: 0 auto 12px; }
        .input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--green); }
        .input-wrapper .fa-envelope { color: var(--yellow); }
        .input-wrapper input {
            width: 100%; padding: 12px 10px 12px 40px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none; box-sizing: border-box;
        }

        .login-submit {
            width: 90%; padding: 12px; background: var(--green);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .create-link {
            display: inline-block; margin-top: 15px; color: var(--green);
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>

<body>

<div class="login-container">
    <div class="close-btn" onclick="closeApp()"><i class="fas fa-times-circle"></i></div>
    
    <div class="profile-area">
        <div class="dp-circle">
            <i class="fas fa-user" id="loginIcon"></i>
            <img src="" id="loginPreview">
        </div>
    </div>

    <h2 style="color:white; margin:0; font-size: 20px;">Welcome Back</h2>
    <p style="color:#a0aec0; font-size:13px; margin-bottom:20px;">Login to your account</p>

    <div class="input-wrapper">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Gmail ID" oninput="fetchUserDP(this.value)">
    </div>

    <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPass" placeholder="Password">
    </div>

    <button class="login-submit" onclick="doLogin()">Login</button>

    <div class="create-link" onclick="doGoogleAuth()">Create Google Account</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDuvS7Ca8yMORsFbPetbTLrE6jGR74k0nI",
    authDomain: "call-ce2bd.firebaseapp.com",
    databaseURL: "https://call-ce2bd-default-rtdb.firebaseio.com",
    projectId: "call-ce2bd",
    storageBucket: "call-ce2bd.firebasestorage.app",
    messagingSenderId: "546567026971",
    appId: "1:546567026971:web:e309b3779b46087a8c3bbe"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

// Google Auth Logic (Auto Account Creation)
async function doGoogleAuth() {
    try {
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        const uid = user.uid;
        const shortID = uid.substring(0, 6).toUpperCase();

        // Check if user already exists in Firestore
        const userDoc = await db.collection("users").doc(uid).get();

        if (!userDoc.exists) {
            // Naya user hai toh profile save karein (Google details ke saath)
            await db.collection("users").doc(uid).set({
                username: user.displayName || "Google User",
                email: user.email,
                dp: user.photoURL || "",
                shortID: shortID,
                createdAt: Date.now()
            });

            await rtdb.ref('users/' + uid).set({
                name: user.displayName || "Google User",
                shortID: shortID,
                status: "online",
                lastSeen: Date.now(),
                dp: user.photoURL || ""
            });
        } else {
            // Agar purana user hai toh sirf status online karein
            await rtdb.ref('users/' + uid).update({
                status: "online",
                lastSeen: Date.now()
            });
        }

        localStorage.setItem("myUserID", uid);
        window.location.href = "dashboard.html";
    } catch (e) {
        console.error(e);
        alert("Google Sign-In Failed: " + e.message);
    }
}

async function fetchUserDP(email) {
    if (email.includes('@') && email.trim().length > 5) {
        try {
            const snap = await db.collection("users").where("email", "==", email.trim().toLowerCase()).get();
            if (!snap.empty) {
                const data = snap.docs[0].data();
                const img = document.getElementById('loginPreview');
                const icon = document.getElementById('loginIcon');
                if (data.dp) {
                    img.src = data.dp; 
                    img.style.display = 'block';
                    icon.style.display = 'none';
                }
            }
        } catch (e) { console.error("DP Fetch Error:", e); }
    }
}

async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    if(!email || !pass) return alert("Enter credentials");

    try {
        const cred = await auth.signInWithEmailAndPassword(email, pass);
        const uid = cred.user.uid;
        await rtdb.ref('users/' + uid).update({ status: "online", lastSeen: Date.now() });
        localStorage.setItem("myUserID", uid);
        window.location.href = "dashboard.html";
    } catch (e) { alert("Invalid Gmail or Password"); }
}

function closeApp() {
    const { ipcRenderer } = (typeof require !== 'undefined') ? require('electron') : { ipcRenderer: null };
    if (ipcRenderer) ipcRenderer.send("close-app");
    else window.close();
}
</script>
</body>
</html>
