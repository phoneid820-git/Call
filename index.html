<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Sync Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --bg: #0a0f1d; --card: #1e293b; --green: #25D366; --red: #ff3b30; --yellow: #ffcc00; }

        body {
            margin: 0; padding: 0; background: transparent !important;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .login-container {
            width: 90%; max-width: 350px; background: var(--bg);
            border-radius: 30px; padding: 40px 20px; position: relative;
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1); -webkit-app-region: drag;
        }

        .close-btn, .cam-icon, input, .login-submit, .profile-area { -webkit-app-region: no-drag; }

        .close-btn { position: absolute; top: 15px; right: 20px; color: #718096; cursor: pointer; font-size: 26px; z-index: 1000; }
        .close-btn:hover { color: var(--red); }

        .profile-area { position: relative; width: 110px; height: 110px; margin: 0 auto 25px; }

        .dp-circle { width: 100%; height: 100%; border-radius: 50%; background: var(--card); border: 3px solid var(--green); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .dp-circle i { font-size: 45px; color: var(--green); }
        .dp-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .cam-icon {
            position: absolute; bottom: 2px; right: 5px;
            background: var(--green); width: 32px; height: 32px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; color: white; border: 2px solid var(--bg);
            cursor: pointer;
        }

        .input-wrapper { position: relative; width: 85%; margin: 0 auto 20px; }

        .input-wrapper i {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); color: var(--green);
        }
        
        /* Gmail Icon specific yellow color */
        .input-wrapper .fa-envelope { color: var(--yellow); }

        .input-wrapper input {
            width: 100%; padding: 12px 10px 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none;
            box-sizing: border-box;
        }

        .login-submit {
            width: auto; min-width: 140px;
            padding: 12px 30px;
            background: var(--green);
            color: white; border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-submit:active { transform: scale(0.95); }
    </style>
</head>

<body>

<div class="login-container">
    <div class="close-btn" id="exitBtn"><i class="fas fa-times-circle"></i></div>

    <div class="profile-area">
        <div class="dp-circle">
            <i class="fas fa-user" id="defIcon"></i>
            <img src="" id="imgPreview">
        </div>
        <label for="fileInput" class="cam-icon">
            <i class="fas fa-camera"></i>
        </label>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="loadImg(this)">
    </div>

    <h2 style="color:white; margin:0; font-size: 22px;">Create Account</h2>
    <p style="color:#a0aec0; font-size:14px; margin-bottom:20px;">Welcome to <b>Sync Call</b></p>

    <div class="input-wrapper">
        <i class="fas fa-user-edit"></i>
        <input type="text" id="fullName" placeholder="Enter Full Name">
    </div>

    <div class="input-wrapper">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter Gmail ID">
    </div>

    <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Enter Password">
    </div>

    <button class="login-submit" id="loginBtn" onclick="doLogin()">Login</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Configuration (Aapko apna config yahan dalna hoga)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const { ipcRenderer } = (typeof require !== 'undefined') ? require('electron') : { ipcRenderer: null };

function loadImg(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('imgPreview');
            img.src = e.target.result;
            img.style.display = 'block';
            document.getElementById('defIcon').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

async function doLogin() {
    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const preview = document.getElementById('imgPreview').src;
    const loginBtn = document.getElementById('loginBtn');

    if (!name || !email || !password) {
        alert("Please fill all fields");
        return;
    }

    loginBtn.innerText = "Processing...";
    loginBtn.disabled = true;

    try {
        // Firebase Authentication: Create User or Login
        const userCredential = await auth.createUserWithEmailAndPassword(email, password)
            .catch(async (error) => {
                if (error.code === 'auth/email-already-in-use') {
                    return await auth.signInWithEmailAndPassword(email, password);
                }
                throw error;
            });

        const user = userCredential.user;
        const profileData = (preview && preview.startsWith("data:")) ? preview : "";

        // Firestore mein user ka extra data save karna
        await db.collection("users").doc(user.uid).set({
            username: name,
            email: email,
            dp: profileData,
            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Local storage mein data save karein
        localStorage.setItem("myUserID", user.uid);
        localStorage.setItem("myUserName", name);
        localStorage.setItem("myUserPic", profileData);

        window.location.href = "dashboard.html";
        
    } catch (err) { 
        console.error("Auth Error:", err);
        alert(err.message);
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
    }
}

document.getElementById('exitBtn').onclick = () => {
    if (ipcRenderer) ipcRenderer.send("close-app");
    else window.close();
};
</script>

</body>
</html>
