<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Sync Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --bg: #0a0f1d; --card: #1e293b; --green: #25D366; --red: #ff3b30; --yellow: #ffcc00; }

        body {
            margin: 0; padding: 0; background: transparent !important;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .login-container {
            width: 90%; max-width: 350px; background: var(--bg);
            border-radius: 30px; padding: 30px 20px; position: relative;
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1); -webkit-app-region: drag;
        }

        .close-btn, .cam-icon, input, .login-submit, .profile-area, .google-btn { -webkit-app-region: no-drag; }

        .close-btn { position: absolute; top: 15px; right: 20px; color: #718096; cursor: pointer; font-size: 26px; z-index: 1000; }
        .close-btn:hover { color: var(--red); }

        .profile-area { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; }

        .dp-circle { width: 100%; height: 100%; border-radius: 50%; background: var(--card); border: 3px solid var(--green); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .dp-circle i { font-size: 40px; color: var(--green); }
        .dp-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .cam-icon {
            position: absolute; bottom: 0px; right: 0px;
            background: var(--green); width: 30px; height: 30px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; color: white; border: 2px solid var(--bg);
            cursor: pointer;
        }

        .input-wrapper { position: relative; width: 85%; margin: 0 auto 15px; }

        .input-wrapper i {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); color: var(--green);
        }
        
        /* Gmail ID icon updated to yellow as requested */
        .input-wrapper .fa-envelope { color: var(--yellow); }

        .input-wrapper input {
            width: 100%; padding: 12px 10px 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none;
            box-sizing: border-box;
        }

        .login-submit {
            width: 85%; padding: 12px;
            background: var(--green);
            color: white; border: none;
            border-radius: 12px; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 5px;
        }

        .google-btn {
            width: 85%; padding: 10px;
            background: white; color: #444;
            border: none; border-radius: 12px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; margin-top: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-left: auto; margin-right: auto;
        }
        .google-btn img { width: 20px; }

        .divider { color: #555; font-size: 12px; margin: 15px 0; }
    </style>
</head>

<body>

<div class="login-container">
    <div class="close-btn" id="exitBtn"><i class="fas fa-times-circle"></i></div>

    <div class="profile-area">
        <div class="dp-circle" id="dpArea">
            <i class="fas fa-user" id="defIcon"></i>
            <img src="" id="imgPreview">
        </div>
        <label for="fileInput" class="cam-icon" id="camLabel">
            <i class="fas fa-camera"></i>
        </label>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="loadImg(this)">
    </div>

    <h2 id="formTitle" style="color:white; margin:0; font-size: 20px;">Welcome</h2>
    <p style="color:#a0aec0; font-size:13px; margin-bottom:15px;">Login to <b>Sync Call</b></p>

    <div class="input-wrapper" id="nameWrapper">
        <i class="fas fa-user-edit"></i>
        <input type="text" id="fullName" placeholder="Full Name">
    </div>

    <div class="input-wrapper">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Gmail ID" oninput="checkUser(this.value)">
    </div>

    <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="login-submit" id="loginBtn" onclick="doLogin()">Login / Register</button>

    <div class="divider">OR</div>

    <button class="google-btn" onclick="loginWithGoogle()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg">
        Continue with Google
    </button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDuvS7Ca8yMORsFbPetbTLrE6jGR74k0nI",
  authDomain: "call-ce2bd.firebaseapp.com",
  databaseURL: "https://call-ce2bd-default-rtdb.firebaseio.com",
  projectId: "call-ce2bd",
  storageBucket: "call-ce2bd.firebasestorage.app",
  messagingSenderId: "546567026971",
  appId: "1:546567026971:web:e309b3779b46087a8c3bbe",
  measurementId: "G-ZPDHLBWE0Z"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const googleProvider = new firebase.auth.GoogleAuthProvider();

// Updated to Redirect Method to fix Network/Popup issues
function loginWithGoogle() {
    auth.signInWithRedirect(googleProvider);
}

// Handles the result after redirecting back to index.html
auth.getRedirectResult().then(async (result) => {
    if (result && result.user) {
        const user = result.user;

        // User data save in Firestore
        await db.collection("users").doc(user.uid).set({
            username: user.displayName,
            email: user.email,
            dp: user.photoURL,
            lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
            status: "online"
        }, { merge: true });

        // Save in Local Storage
        localStorage.setItem("myUserID", user.uid);
        localStorage.setItem("myUserName", user.displayName);
        localStorage.setItem("myUserPic", user.photoURL);

        window.location.href = "dashboard.html";
    }
}).catch((error) => {
    console.error("Google Login Error:", error);
    if(error.code !== "auth/network-request-failed") {
        alert("Login Failed: " + error.message);
    }
});

async function checkUser(email) {
    if (email.includes('@') && email.length > 5) {
        const snap = await db.collection("users").where("email", "==", email.trim()).get();
        if (!snap.empty) {
            const data = snap.docs[0].data();
            document.getElementById('formTitle').innerText = "Welcome Back";
            document.getElementById('nameWrapper').style.display = 'none';
            if (data.dp) {
                const img = document.getElementById('imgPreview');
                img.src = data.dp; img.style.display = 'block';
                document.getElementById('defIcon').style.display = 'none';
            }
        }
    }
}

function loadImg(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('imgPreview');
            img.src = e.target.result; img.style.display = 'block';
            document.getElementById('defIcon').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

async function doLogin() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const name = document.getElementById('fullName').value;

    if(!email || !pass) return alert("Fill all fields");

    try {
        // Simple Auth Logic for Manual Login
        const userCredential = await auth.signInWithEmailAndPassword(email, pass).catch(async (err) => {
            if(err.code === 'auth/user-not-found') {
                return await auth.createUserWithEmailAndPassword(email, pass);
            }
            throw err;
        });

        const user = userCredential.user;
        if(name) {
            await db.collection("users").doc(user.uid).set({
                username: name,
                email: email,
                status: "online"
            }, { merge: true });
            localStorage.setItem("myUserName", name);
        }

        localStorage.setItem("myUserID", user.uid);
        window.location.href = "dashboard.html";

    } catch (e) {
        alert(e.message);
    }
}

const { ipcRenderer } = (typeof require !== 'undefined') ? require('electron') : { ipcRenderer: null };
document.getElementById('exitBtn').onclick = () => {
    if (ipcRenderer) ipcRenderer.send("close-app");
    else window.close();
};
</script>
</body>
</html>
