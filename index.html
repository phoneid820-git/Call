<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Sync Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --bg: #0a0f1d; --card: #1e293b; --green: #25D366; --red: #ff3b30; --yellow: #ffcc00; }

        body {
            margin: 0; padding: 0; background: transparent !important;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .login-container {
            width: 90%; max-width: 350px; background: var(--bg);
            border-radius: 30px; padding: 30px 20px; position: relative;
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1); -webkit-app-region: drag;
        }

        /* Full Screen Popup Design */
        #createPopup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 29, 0.95); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }

        .popup-content {
            width: 85%; max-width: 350px; background: rgba(255,255,255,0.05);
            padding: 30px 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .close-btn, .cam-icon, input, button, .create-link { -webkit-app-region: no-drag; }

        .close-btn { position: absolute; top: 15px; right: 20px; color: #718096; cursor: pointer; font-size: 26px; z-index: 1000; }
        
        .profile-area { position: relative; width: 90px; height: 90px; margin: 0 auto 15px; }
        .dp-circle { width: 100%; height: 100%; border-radius: 50%; background: var(--card); border: 3px solid var(--green); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .dp-circle i { font-size: 35px; color: var(--green); }
        .dp-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .cam-icon {
            position: absolute; bottom: 0; right: 0;
            background: var(--green); width: 28px; height: 28px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; color: white; border: 2px solid var(--bg);
            cursor: pointer; font-size: 12px;
        }

        .input-wrapper { position: relative; width: 90%; margin: 0 auto 12px; }
        .input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--green); }
        .input-wrapper .fa-envelope { color: var(--yellow); }
        .input-wrapper input {
            width: 100%; padding: 12px 10px 12px 40px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none; box-sizing: border-box;
        }

        .login-submit {
            width: 90%; padding: 12px; background: var(--green);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .create-link {
            display: inline-block; margin-top: 15px; color: var(--green);
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>

<body>

<div class="login-container">
    <div class="close-btn" onclick="closeApp()"><i class="fas fa-times-circle"></i></div>
    
    <div class="profile-area">
        <div class="dp-circle">
            <i class="fas fa-user" id="loginIcon"></i>
            <img src="" id="loginPreview">
        </div>
    </div>

    <h2 style="color:white; margin:0; font-size: 20px;">Welcome Back</h2>
    <p style="color:#a0aec0; font-size:13px; margin-bottom:20px;">Login to your account</p>

    <div class="input-wrapper">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Gmail ID" oninput="fetchUserDP(this.value)">
    </div>

    <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPass" placeholder="Password">
    </div>

    <button class="login-submit" onclick="doLogin()">Login</button>

    <div class="create-link" onclick="togglePopup(true)">Create Google Account</div>
</div>

<div id="createPopup">
    <div class="popup-content">
        <div class="close-btn" onclick="togglePopup(false)"><i class="fas fa-times-circle"></i></div>
        
        <div class="profile-area">
            <div class="dp-circle">
                <i class="fas fa-user" id="regIcon"></i>
                <img src="" id="regPreview">
            </div>
            <label for="regFile" class="cam-icon"><i class="fas fa-camera"></i></label>
            <input type="file" id="regFile" hidden accept="image/*" onchange="previewImg(this, 'regPreview', 'regIcon')">
        </div>

        <h3 style="color:white; margin-bottom:15px;">Register Account</h3>

        <div class="input-wrapper">
            <i class="fas fa-user-edit"></i>
            <input type="text" id="regName" placeholder="Full Name">
        </div>

        <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" placeholder="Gmail ID">
        </div>

        <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPass" placeholder="Password">
        </div>

        <button class="login-submit" onclick="doRegister()">Create Now</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDuvS7Ca8yMORsFbPetbTLrE6jGR74k0nI",
    authDomain: "call-ce2bd.firebaseapp.com",
    projectId: "call-ce2bd",
    storageBucket: "call-ce2bd.firebasestorage.app",
    messagingSenderId: "546567026971",
    appId: "1:546567026971:web:e309b3779b46087a8c3bbe"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function togglePopup(show) {
    document.getElementById('createPopup').style.display = show ? 'flex' : 'none';
}

// 1. Fetch DP Automatically on Login Screen
async function fetchUserDP(email) {
    if (email.includes('@') && email.length > 5) {
        const snap = await db.collection("users").where("email", "==", email.trim()).get();
        if (!snap.empty) {
            const data = snap.docs[0].data();
            if (data.dp) {
                const img = document.getElementById('loginPreview');
                img.src = data.dp; img.style.display = 'block';
                document.getElementById('loginIcon').style.display = 'none';
            }
        }
    }
}

// 2. Image Preview for Registration
function previewImg(input, imgID, iconID) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById(imgID).src = e.target.result;
            document.getElementById(imgID).style.display = 'block';
            document.getElementById(iconID).style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

// 3. Register Logic
async function doRegister() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const pass = document.getElementById('regPass').value;
    const dpSrc = document.getElementById('regPreview').src;

    if(!name || !email || !pass) return alert("Please fill all details");

    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await db.collection("users").doc(cred.user.uid).set({
            username: name,
            email: email,
            dp: dpSrc.startsWith('data') ? dpSrc : "",
            status: "online"
        });
        localStorage.setItem("myUserID", cred.user.uid);
        window.location.href = "dashboard.html";
    } catch (e) { alert(e.message); }
}

// 4. Login Logic
async function doLogin() {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;

    try {
        const cred = await auth.signInWithEmailAndPassword(email, pass);
        localStorage.setItem("myUserID", cred.user.uid);
        window.location.href = "dashboard.html";
    } catch (e) { alert("Invalid Gmail or Password"); }
}

function closeApp() {
    const { ipcRenderer } = (typeof require !== 'undefined') ? require('electron') : { ipcRenderer: null };
    if (ipcRenderer) ipcRenderer.send("close-app");
    else window.close();
}
</script>
</body>
</html>
